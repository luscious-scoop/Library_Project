		<header>
			<h1>Library</h1>
			<button id="dialog-open-btn">+Add</button>
		</header>
		<dialog id="my-dialog">
			<form>
				<div class="inputs">
					<input type="text" placeholder="Title" id="title-input" />
					<input type="text" placeholder="Author" id="author-input" />
					<input
						type="number"
						placeholder="Pages"
						id="number-input"
					/>
				</div>
				<div class="checkbox">
					<label for="check-input">Have you Read it?</label>
					<input type="checkbox" value="read" id="check-input" />
				</div>
				<div class="form-btn">
					<button id="save-btn">Save</button>
					<button id="cancel-btn" formmethod="dialog">Cancel</button>
				</div>
			</form>
		</dialog>

				</div>
