<!doctype html>
<html lang="en">
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Library</title>
		<script defer src="script.js"></script>
	</head>
	<body>
		<header>
			<h1>Library</h1>
			<button id="dialog-open-btn">+Add</button>
		</header>
		<dialog id="my-dialog" autofocus="none">
			<form>
				<div class="inputs">
					<input
						type="text"
						placeholder="Title"
						id="title-input"
						required
					/>
					<input
						type="text"
						placeholder="Author"
						id="author-input"
						required
					/>
					<input
						required
						type="number"
						placeholder="Pages"
						id="pages-input"
					/>
				</div>
				<div class="checkbox">
					<label for="check-input">Have you Read it?</label>
					<input type="checkbox" value="read" id="check-input" />
				</div>
				<div class="form-btn">
					<button id="save-btn">Save</button>
					<button id="cancel-btn" formmethod="dialog" formnovalidate>
						Cancel
					</button>
				</div>
			</form>
		</dialog>
		<div class="cards-container"></div>
	</body>
</html>
